name: Detect Version Changes

on:
  workflow_run:
    workflows: ["Build and Test"]
    types: [completed]
  workflow_dispatch:

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.detect.outputs.version_changed }}
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version changes
        id: detect
        run: |
          # Get config
          CONFIG=$(cat .github/version-config.json)
          PACKAGES=$(echo $CONFIG | jq -r '.packages[].csprojPath')

          VERSION_CHANGED=false
          CHANGED_PACKAGES="[]"

          for CSPROJ in $PACKAGES; do
            if git diff HEAD~1 HEAD -- "$CSPROJ" | grep -q "PackageVersion"; then
              echo "Version changed in: $CSPROJ"
              VERSION_CHANGED=true

              # Extract package name and version
              PACKAGE_NAME=$(basename $(dirname $CSPROJ))
              NEW_VERSION=$(grep '<PackageVersion>' "$CSPROJ" | sed -E 's/.*<PackageVersion>(.*)<\/PackageVersion>.*/\1/')
              OLD_VERSION=$(git show HEAD~1:"$CSPROJ" | grep '<PackageVersion>' | sed -E 's/.*<PackageVersion>(.*)<\/PackageVersion>.*/\1/')

              # Append to changed packages
              CHANGED_PACKAGES=$(echo $CHANGED_PACKAGES | jq --arg name "$PACKAGE_NAME" --arg new "$NEW_VERSION" --arg old "$OLD_VERSION" '. += [{"name": $name, "oldVersion": $old, "newVersion": $new}]')
            fi
          done

          echo "version_changed=$VERSION_CHANGED" >> $GITHUB_OUTPUT
          echo "packages<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_PACKAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "$VERSION_CHANGED" = true ]; then
            echo "Version changes detected!"
            echo "Changed packages: $CHANGED_PACKAGES"
          else
            echo "No version changes detected"
          fi

  notify:
    needs: detect-versions
    runs-on: ubuntu-latest
    if: needs.detect-versions.outputs.version_changed == 'true'
    steps:
      - name: Report version changes
        run: |
          echo "Version changes detected:"
          echo "${{ needs.detect-versions.outputs.packages }}" | jq '.'
