name: Publish NuGet Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        type: choice
        description: 'Which packages to publish?'
        options:
          - 'YC.Monad'
          - 'YC.Monad.EntityFrameworkCore'
          - 'All'
      version:
        description: 'Version to publish'
        required: true
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0'

    - name: Determine packages to publish
      id: packages
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "packages=All" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          echo "packages=${{ github.event.inputs.packages }}" >> $GITHUB_OUTPUT
        fi

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Pack YC.Monad
      if: |
        steps.packages.outputs.packages == 'YC.Monad' ||
        steps.packages.outputs.packages == 'All'
      run: |
        dotnet pack src/YC.Monad/YC.Monad.csproj \
          --configuration Release \
          --no-build \
          --output ./nuget

    - name: Pack YC.Monad.EntityFrameworkCore
      if: |
        steps.packages.outputs.packages == 'YC.Monad.EntityFrameworkCore' ||
        steps.packages.outputs.packages == 'All'
      run: |
        dotnet pack src/YC.Monad.EntityFrameworkCore/YC.Monad.EntityFrameworkCore.csproj \
          --configuration Release \
          --no-build \
          --output ./nuget

    - name: Push to NuGet
      run: |
        dotnet nuget push "./nuget/*.nupkg" \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      continue-on-error: true

    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## Changes in this Release

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for detailed changes.
        artifacts: ./nuget/*.nupkg
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to workflow artifacts
      uses: actions/upload-artifact@v3
      with:
        name: nuget-packages
        path: ./nuget/
        retention-days: 30

