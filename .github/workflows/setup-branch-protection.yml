# Branch Protection Setup (GitHub Actions Version)
# This workflow sets up branch protection automatically when triggered
# Alternative to local setup-branch-protection.ps1 script

name: Setup Branch Protection

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository (owner/repo)'
        required: true
        type: string
      branch:
        description: 'Branch to protect'
        required: false
        default: 'main'
        type: string
      require_reviews:
        description: 'Require pull request reviews'
        required: false
        default: true
        type: boolean
      required_review_count:
        description: 'Required approving reviews'
        required: false
        default: 1
        type: number
      require_up_to_date:
        description: 'Require branches to be up to date'
        required: false
        default: true
        type: boolean
      include_admins:
        description: 'Include administrators in protection rules'
        required: false
        default: true
        type: boolean

jobs:
  setup-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Branch Protection
        uses: actions/github-script@v7
        with:
          script: |
            const {
              repository,
              branch,
              require_reviews,
              required_review_count,
              require_up_to_date,
              include_admins
            } = context.payload.inputs;

            const protectionRules = {
              required_status_checks: {
                strict: require_up_to_date,
                contexts: ['ci-build-test', 'detect-version-changes']
              },
              enforce_admins: include_admins,
              required_pull_request_reviews: require_reviews ? {
                required_approving_review_count: parseInt(required_review_count)
              } : null,
              restrictions: null
            };

            try {
              await github.rest.repos.updateBranchProtection({
                owner: context.repo.owner,
                repo: repository.split('/')[1],
                branch: branch,
                required_status_checks: protectionRules.required_status_checks,
                enforce_admins: protectionRules.enforce_admins,
                required_pull_request_reviews: protectionRules.required_pull_request_reviews,
                restrictions: protectionRules.restrictions
              });

              core.info('✅ Branch protection rules applied successfully!');
              core.info('📋 Applied rules:');
              core.info(`   • Require status checks: ci-build-test, detect-version-changes`);
              core.info(`   • Strict status checks: ${require_up_to_date}`);
              if (require_reviews) {
                core.info(`   • Required reviews: ${required_review_count}`);
              }
              core.info(`   • Include administrators: ${include_admins}`);
            } catch (error) {
              core.setFailed(`❌ Failed to apply branch protection: ${error.message}`);
            }
