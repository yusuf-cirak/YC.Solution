# Branch Protection Setup (Alternative: GitHub Actions Version)
# This workflow sets up branch protection automatically when triggered

name: Setup Branch Protection

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository (owner/repo)'
        required: true
        type: string
      branch:
        description: 'Branch to protect'
        required: false
        default: 'main'
        type: string
      require_reviews:
        description: 'Require pull request reviews'
        required: false
        default: true
        type: boolean
      required_review_count:
        description: 'Required approving reviews'
        required: false
        default: 1
        type: number

jobs:
  setup-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Branch Protection
        uses: actions/github-script@v7
        with:
          script: |
            const { repository, branch, require_reviews, required_review_count } = context.payload.inputs;

            const protectionRules = {
              required_status_checks: {
                strict: true,
                contexts: ['ci-build-test', 'detect-version-changes']
              },
              enforce_admins: true,
              required_pull_request_reviews: require_reviews ? {
                required_approving_review_count: parseInt(required_review_count)
              } : null,
              restrictions: null
            };

            try {
              await github.rest.repos.updateBranchProtection({
                owner: context.repo.owner,
                repo: repository.split('/')[1],
                branch: branch,
                required_status_checks: protectionRules.required_status_checks,
                enforce_admins: protectionRules.enforce_admins,
                required_pull_request_reviews: protectionRules.required_pull_request_reviews,
                restrictions: protectionRules.restrictions
              });

              core.info('✅ Branch protection rules applied successfully!');
            } catch (error) {
              core.setFailed(`❌ Failed to apply branch protection: ${error.message}`);
            }
