name: Automated Version Bump and Release

on:
  workflow_dispatch:

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Bump version
      id: version
      run: |
        pwsh -Command {
          $config = Get-Content '.github/version-config.json' | ConvertFrom-Json

          function Bump-Version ($version, $type) {
            $parts = $version -split '\.'
            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2]

            if ($type -eq 'major') {
              $major += 1
              $minor = 0
              $patch = 0
            } elseif ($type -eq 'minor') {
              $minor += 1
              $patch = 0
            } else {
              $patch += 1
            }

            return "$major.$minor.$patch"
          }

          if ("${{ github.event.inputs.package }}" -eq "YC.Monad" -or "${{ github.event.inputs.package }}" -eq "Both") {
            $csproj = "src/YC.Monad/YC.Monad.csproj"
            $current = Select-String '<PackageVersion>(.*?)</PackageVersion>' $csproj | ForEach-Object { $_.Matches[0].Groups[1].Value }
            $new = Bump-Version $current "${{ github.event.inputs.bump_type }}"

            (Get-Content $csproj) -replace "<PackageVersion>.*?</PackageVersion>", "<PackageVersion>$new</PackageVersion>" | Set-Content $csproj

            Write-Host "Bumped YC.Monad from $current to $new"
            Add-Content $GITHUB_OUTPUT "monad_version=$new"
          }

          if ("${{ github.event.inputs.package }}" -eq "YC.Monad.EntityFrameworkCore" -or "${{ github.event.inputs.package }}" -eq "Both") {
            $csproj = "src/YC.Monad.EntityFrameworkCore/YC.Monad.EntityFrameworkCore.csproj"
            $current = Select-String '<PackageVersion>(.*?)</PackageVersion>' $csproj | ForEach-Object { $_.Matches[0].Groups[1].Value }
            $new = Bump-Version $current "${{ github.event.inputs.bump_type }}"

            (Get-Content $csproj) -replace "<PackageVersion>.*?</PackageVersion>", "<PackageVersion>$new</PackageVersion>" | Set-Content $csproj

            Write-Host "Bumped YC.Monad.EntityFrameworkCore from $current to $new"
            Add-Content $GITHUB_OUTPUT "efcore_version=$new"
          }
        }

    - name: Update CHANGELOG
      run: |
        VERSION="${{ steps.version.outputs.monad_version }}"
        if [ -z "$VERSION" ]; then
          VERSION="${{ steps.version.outputs.efcore_version }}"
        fi

        RELEASE_DATE=$(date +%Y-%m-%d)

        # Create changelog entry
        {
          echo "## [$VERSION] - $RELEASE_DATE"
          echo ""
          echo "### YC.Monad"
          echo ""
          echo "#### Added"
          echo "- New functionality"
          echo ""
          echo "#### Fixed"
          echo "- Bug fixes"
          echo ""
          echo "### YC.Monad.EntityFrameworkCore"
          echo ""
          echo "#### Added"
          echo "- New functionality"
          echo ""
          echo "#### Fixed"
          echo "- Bug fixes"
          echo ""
          echo "---"
          echo ""
        } > /tmp/changelog_entry.txt

        NEW_ENTRY=$(cat /tmp/changelog_entry.txt)

        # Update CHANGELOG.md
        sed -i "/## \[Unreleased\]/, /---/c\\$NEW_ENTRY" CHANGELOG.md

    - name: Commit and create tag
      run: |
        pwsh -Command {
          $version = "${{ steps.version.outputs.monad_version }}"
          if (-not $version) { $version = "${{ steps.version.outputs.efcore_version }}" }

          git add -A
          git commit -m "chore: bump version to $version"
          git tag -a "v$version" -m "Release version $version"
          git push
          git push --tags

          Write-Host "✓ Version bumped to $version and tagged"
        }
